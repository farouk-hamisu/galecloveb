<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Transfer PIN</title>
  <style>
    body {
      font-family: Arial, Helvetica, sans-serif;
      background-color: #f4f6f8;
      margin: 0;
      padding: 0;
      color: #1f2937;
    }
    .container {
      max-width: 600px;
      margin: 30px auto;
      background-color: #ffffff;
      padding: 24px;
      border-radius: 10px;
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.08);
    }
    .header {
      text-align: center;
      padding-bottom: 20px;
      border-bottom: 1px solid #e5e7eb;
    }
    .header h1 {
      margin: 0;
      color: #2563eb; /* Galecloveb primary blue */
      font-size: 26px;
      font-weight: bold;
    }
    .content {
      padding: 24px 0;
      line-height: 1.7;
      font-size: 15px;
    }
    .otp-code {
      text-align: center;
      font-size: 28px;
      font-weight: bold;
      letter-spacing: 6px;
      margin: 24px 0;
      padding: 14px;
      background-color: #eff6ff;
      color: #2563eb;
      border-radius: 8px;
      border: 1px dashed #93c5fd;
    }
    .footer {
      text-align: center;
      font-size: 12px;
      color: #6b7280;
      padding-top: 20px;
      border-top: 1px solid #e5e7eb;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Galecloveb</h1>
    </div>

    <div class="content">
      <p>Hello,</p>
      <p>
        To authorize your transfer, please use the PIN below.
        This PIN is valid for <strong>3 minutes</strong>.
      </p>

      <div class="otp-code">{{otp}}</div>

      <p>
        If you did not request this transfer, please contact our support team immediately.
      </p>
    </div>

    <div class="footer">
      <p>&copy; 2026 Galecloveb. All rights reserved.</p>
    </div>
  </div>
</body>
</html>
